<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>765 Notary Services – Nationwide Coverage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        #header {
            background: #00875a;
            color: white;
            padding: 12px;
            font-size: 20px;
            text-align: center;
        }
        #state-name {
            font-weight: bold;
        }
    </style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div id="header">
    765 Notary Services – Nationwide Coverage<br>
    <span id="mapStatus">Click a state to view counties</span>
</div>

<div id="map"></div>

<script>
    const BOOKING_URL = "https://www.calendly.com/765notary";

    // ⭐ Your GeoJSON files
    const STATE_GEOJSON_URL = "data/us-states.geojson";
    const COUNTY_GEOJSON_URL = "data/us-counties.geojson";

    // ⭐ Map of state FIPS → same counties file
    const STATE_COUNTY_MAP = {
        "01": COUNTY_GEOJSON_URL, "02": COUNTY_GEOJSON_URL, "04": COUNTY_GEOJSON_URL,
        "05": COUNTY_GEOJSON_URL, "06": COUNTY_GEOJSON_URL, "08": COUNTY_GEOJSON_URL,
        "09": COUNTY_GEOJSON_URL, "10": COUNTY_GEOJSON_URL, "11": COUNTY_GEOJSON_URL,
        "12": COUNTY_GEOJSON_URL, "13": COUNTY_GEOJSON_URL, "15": COUNTY_GEOJSON_URL,
        "16": COUNTY_GEOJSON_URL, "17": COUNTY_GEOJSON_URL, "18": COUNTY_GEOJSON_URL,
        "19": COUNTY_GEOJSON_URL, "20": COUNTY_GEOJSON_URL, "21": COUNTY_GEOJSON_URL,
        "22": COUNTY_GEOJSON_URL, "23": COUNTY_GEOJSON_URL, "24": COUNTY_GEOJSON_URL,
        "25": COUNTY_GEOJSON_URL, "26": COUNTY_GEOJSON_URL, "27": COUNTY_GEOJSON_URL,
        "28": COUNTY_GEOJSON_URL, "29": COUNTY_GEOJSON_URL, "30": COUNTY_GEOJSON_URL,
        "31": COUNTY_GEOJSON_URL, "32": COUNTY_GEOJSON_URL, "33": COUNTY_GEOJSON_URL,
        "34": COUNTY_GEOJSON_URL, "35": COUNTY_GEOJSON_URL, "36": COUNTY_GEOJSON_URL,
        "37": COUNTY_GEOJSON_URL, "38": COUNTY_GEOJSON_URL, "39": COUNTY_GEOJSON_URL,
        "40": COUNTY_GEOJSON_URL, "41": COUNTY_GEOJSON_URL, "42": COUNTY_GEOJSON_URL,
        "44": COUNTY_GEOJSON_URL, "45": COUNTY_GEOJSON_URL, "46": COUNTY_GEOJSON_URL,
        "47": COUNTY_GEOJSON_URL, "48": COUNTY_GEOJSON_URL, "49": COUNTY_GEOJSON_URL,
        "50": COUNTY_GEOJSON_URL, "51": COUNTY_GEOJSON_URL, "53": COUNTY_GEOJSON_URL,
        "54": COUNTY_GEOJSON_URL, "55": COUNTY_GEOJSON_URL, "56": COUNTY_GEOJSON_URL
    };

    let map = L.map("map").setView([39.5, -98.35], 4);
    let stateLayer;
    let currentLayer = null;

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18
    }).addTo(map);

    const mapStatus = document.getElementById("mapStatus");

    // ⭐ Load States
    fetch(STATE_GEOJSON_URL)
        .then(res => res.json())
        .then(data => {
            stateLayer = L.geoJSON(data, {
                style: {
                    color: "#004d40",
                    weight: 2,
                    fillColor: "#80cbc4",
                    fillOpacity: 0.4
                },
                onEachFeature: (feature, layer) => {
                    const stateName = feature.properties.NAME;
                    const stateCode = feature.properties.STATEFP;

                    layer.bindTooltip(stateName);

                    layer.on("click", () => {
                        loadStateCounties(stateName, stateCode, layer);
                    });
                }
            }).addTo(map);
        });

    // ⭐ Load Counties for Selected State
    function loadStateCounties(stateName, stateCode, layer) {
        mapStatus.textContent = `Viewing counties in ${stateName}`;

        const countyFile = STATE_COUNTY_MAP[stateCode];
        if (!countyFile) {
            alert(`Counties for ${stateName} not configured.`);
            return;
        }

        if (currentLayer && currentLayer !== stateLayer) {
            map.removeLayer(currentLayer);
        }

        map.fitBounds(layer.getBounds());

        fetch(countyFile)
            .then(res => res.json())
            .then(data => {

                // ⭐ FILTER counties by STATEFP
                const filtered = data.features.filter(
                    f => f.properties.STATEFP === stateCode
                );

                const countyLayer = L.geoJSON(filtered, {
                    style: {
                        color: "#00875a",
                        weight: 1,
                        fillColor: "#b9f6ca",
                        fillOpacity: 0.5
                    },
                    onEachFeature: (feature, cLayer) => {
                        const countyName = feature.properties.NAME;

                        cLayer.bindTooltip(countyName);

                        cLayer.on("click", () => {
                            cLayer.bindPopup(`
                                <strong>We can service ${countyName} County, ${stateName}</strong><br>
                                with an online or in-person notary.<br><br>
                                <button onclick="window.open('${BOOKING_URL}', '_blank')">Book Now</button>
                            `).openPopup();
                        });
                    }
                });

                countyLayer.addTo(map);
                currentLayer = countyLayer;
            });
    }
</script>

</body>
</html>
