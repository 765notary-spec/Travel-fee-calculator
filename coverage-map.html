<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>765 Notary Services – Nationwide Coverage Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { width: 100%; height: 600px; }
    h2 { text-align: center; margin: 16px 0 8px; }
    #map-status { text-align: center; color: #444; margin-bottom: 8px; }
    .leaflet-popup-content button {
      background: #0052cc;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
    }
    .leaflet-popup-content button:hover {
      background: #003f99;
    }
  </style>
</head>

<body>
  <h2>765 Notary Services – Nationwide Coverage</h2>
  <div id="map-status">Click a state to view county-level coverage.</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const BOOKING_URL = "https://www.calendly.com/765notary";

    const STATE_GEOJSON_URL = "data/us-states.geojson";

    // Map state codes to county GeoJSON files
    const STATE_COUNTY_MAP = {
      "AL": "data/al-counties.geojson",
      "AK": "data/ak-counties.geojson",
      "AZ": "data/az-counties.geojson",
      "AR": "data/ar-counties.geojson",
      "CA": "data/ca-counties.geojson",
      "CO": "data/co-counties.geojson",
      "CT": "data/ct-counties.geojson",
      "DE": "data/de-counties.geojson",
      "FL": "data/fl-counties.geojson",
      "GA": "data/ga-counties.geojson",
      "HI": "data/hi-counties.geojson",
      "ID": "data/id-counties.geojson",
      "IL": "data/il-counties.geojson",
      "IN": "data/in-counties.geojson",
      "IA": "data/ia-counties.geojson",
      "KS": "data/ks-counties.geojson",
      "KY": "data/ky-counties.geojson",
      "LA": "data/la-counties.geojson",
      "ME": "data/me-counties.geojson",
      "MD": "data/md-counties.geojson",
      "MA": "data/ma-counties.geojson",
      "MI": "data/mi-counties.geojson",
      "MN": "data/mn-counties.geojson",
      "MS": "data/ms-counties.geojson",
      "MO": "data/mo-counties.geojson",
      "MT": "data/mt-counties.geojson",
      "NE": "data/ne-counties.geojson",
      "NV": "data/nv-counties.geojson",
      "NH": "data/nh-counties.geojson",
      "NJ": "data/nj-counties.geojson",
      "NM": "data/nm-counties.geojson",
      "NY": "data/ny-counties.geojson",
      "NC": "data/nc-counties.geojson",
      "ND": "data/nd-counties.geojson",
      "OH": "data/oh-counties.geojson",
      "OK": "data/ok-counties.geojson",
      "OR": "data/or-counties.geojson",
      "PA": "data/pa-counties.geojson",
      "RI": "data/ri-counties.geojson",
      "SC": "data/sc-counties.geojson",
      "SD": "data/sd-counties.geojson",
      "TN": "data/tn-counties.geojson",
      "TX": "data/tx-counties.geojson",
      "UT": "data/ut-counties.geojson",
      "VT": "data/vt-counties.geojson",
      "VA": "data/va-counties.geojson",
      "WA": "data/wa-counties.geojson",
      "WV": "data/wv-counties.geojson",
      "WI": "data/wi-counties.geojson",
      "WY": "data/wy-counties.geojson"
    };

    const mapStatus = document.getElementById("map-status");

    const map = L.map("map").setView([39.5, -98.35], 4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 10
    }).addTo(map);

    let currentLayer = null;
    let stateLayer = null;

    // Load U.S. states
    fetch(STATE_GEOJSON_URL)
      .then(res => res.json())
      .then(data => {
        stateLayer = L.geoJSON(data, {
          style: {
            color: "#0052cc",
            weight: 1,
            fillColor: "#cfe0ff",
            fillOpacity: 0.5
          },
          onEachFeature: (feature, layer) => {
            const stateName = feature.properties.name;
            const stateCode = feature.properties.STUSPS;

            layer.bindTooltip(stateName);

            layer.on("click", () => loadStateCounties(stateName, stateCode, layer));
          }
        }).addTo(map);

        currentLayer = stateLayer;
      });

    function loadStateCounties(stateName, stateCode, layer) {
      mapStatus.textContent = `Viewing counties in ${stateName}`;

      const countyFile = STATE_COUNTY_MAP[stateCode];
      if (!countyFile) {
        alert(`Counties for ${stateName} not configured yet.`);
        return;
      }

      if (currentLayer && currentLayer !== stateLayer) {
        map.removeLayer(currentLayer);
      }

      map.fitBounds(layer.getBounds());

      fetch(countyFile)
        .then(res => res.json())
        .then(data => {
          const countyLayer = L.geoJSON(data, {
            style: {
              color: "#00875a",
              weight: 1,
              fillColor: "#b9f6ca",
              fillOpacity: 0.5
            },
            onEachFeature: (feature, cLayer) => {
              const countyName = feature.properties.NAME;

              cLayer.bindTooltip(countyName);

              cLayer.on("click", () => {
                cLayer.bindPopup(`
                  <strong>We can service ${countyName} County, ${stateName}</strong><br>
                  with an online or in-person notary.<br><br>
                  <button onclick="window.open('${BOOKING_URL}', '_blank')">Book Now</button>
                `).openPopup();
              });
            }
          }).addTo(map);

          currentLayer = countyLayer;
        });
    }

    // Double-click to reset to U.S. map
    map.on("dblclick", () => {
      if (currentLayer !== stateLayer) {
        map.removeLayer(currentLayer);
        stateLayer.addTo(map);
        currentLayer = stateLayer;
        map.setView([39.5, -98.35], 4);
        mapStatus.textContent = "Click a state to view county-level coverage.";
      }
    });
  </script>
</body>
</html>
